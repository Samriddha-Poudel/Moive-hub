<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Hub</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/mediaquries.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

</head>

<body>


    <div class="container">

        <header>

            <div class="navbar">
                <button class="nav-menu-btn">

                    <span></span><span></span><span></span>
                </button>
                <a class="nav-brand">
                    Movie Hub
                </a>

                <nav>
                    <ul class="navbar-nav">
                        <li><a href="#" class="navbar-link">Home</a></li>
                        <li><a href="#categories" class="navbar-link">Categories</a></li>
                        <li><a hef="#live" class="navbar-link indicator">Live</a></li>

                    </ul>
                </nav>

                <div class="navbar-actions">
                    <form action="#" class="navbar-form">
                        <input type="text" name="search" placeholder="I'm Looking for...." class="navbar-form-search">

                        <button class="navbarform-btn">
                            <ion-icon name="search-outline"></ion-icon>
                        </button>

                        <button class="navbar-form-close">
                            <ion-icon name="close-circle-outline"></ion-icon>
                        </button>
                    </form>


                    <button class="navbar-search-btn">
                        <ion-icon name="search-outline"></ion-icon>
                    </button>

                    <a href="#" class="navbar-signin">
                        <span>Sign In</span>
                        <ion-icon name="log-in-outline"></ion-icon>
                    </a>
                </div>

            </div>
        </header>

        <main>

            <section class="banner">
                <div class="banner-card">
                    <img src="assets/movies/berlin(1).jpg" class="banner-img" alt="">

                    <div class="card-content">
                        <div class="card-info">

                            <div class="gener">
                                <ion-icon name="film"></ion-icon>
                                <span>Crime/Thriller</span>

                            </div>
                            <div class="year">
                                <ion-icon name="calendar"></ion-icon>
                                <span>2026</span>
                            </div>
                            <div class="duration">
                                <ion-icon name="time"></ion-icon>
                                <span>50 min</span>
                            </div>
                            <div class="quality">4K</div>
                            
                        </div>

                        <h2 class="card-title">Berlin Season 2</h2>

                    </div>
                </div>

            </section>




            <section class="movies">


                <div class="filter-bar">
                    <div class="filter-dropdowns">
                        <select name="gener" class="gener" >
                            <option value="all generse">All Generes</option>
                            <option value="action">Action</option>
                            <option value="adventure">Adventure</option>
                            <option value="Animal">Animal</option>
                            <option value="animation">Animation</option>
                            <option value="biography">Biography</option>
                        </select>



                        <select name="year" class="Year">
                            <option value="all years">All Years</option>
                            <option value="2026">2026</option>
                            <option value="2024-2025">2024-2025</option>
                            <option value="2020-2024">2020-2040</option>
                            <option value="2000-2019">2000-2019</option>

                        </select>
                        </div>

                        <div class="filter-radio">
                            <input type="radio" name="grade" id="featured" checked>
                            <label for="featured">Featured</label>


                             <input type="radio" name="grade" id="popular">
                             <label for="popular">Popular</label>

                             <input type="radio" name="grade" id="newest">
                             <label for="newest">Newest</label>
                        </div>

                </div>
                </section>




        </main>
    </div>










    <script src="script.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>

</html>
